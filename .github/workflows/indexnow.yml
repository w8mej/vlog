name: "IndexNow Ping"

on:
  push:
    branches:
      - main
      - master
    paths:
      - '_posts/**'
      - '_tech_posts/**'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow with Sitemap
        run: |
          echo "Submitting sitemap to IndexNow..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.indexnow.org/indexnow?url=https://www.securesql.info/sitemap.xml&key=9e7e25fd010845448bf1527a5942e3e6")
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 202 ]; then
            echo "Successfully submitted to IndexNow (Status: $HTTP_STATUS)"
          else
            echo "Failed to submit to IndexNow. HTTP Status: $HTTP_STATUS"
            exit 1
          fi

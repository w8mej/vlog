<meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>

{% if page.description %}
<meta property="og:description" content="{{ page.description }}" />
<meta name="description" content="{{ page.description }}" />
{% elsif page.excerpt %}
<meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}" />
<meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}" />
{% elsif page.content %}
<meta property="og:description" content="{{ page.content | strip_html | strip_newlines | truncate: 160 }}" />
<meta name="description" content="{{ page.content | strip_html | strip_newlines | truncate: 160 }}" />
{% else %}
<meta property="og:description" content="{{ site.description }}" />
<meta name="description" content="{{ site.description }}" />
{% endif %}
<meta name="author" content="{{ site.name }}" />

{% if page.title %}
<meta property="og:title" content="{{ page.title }}" />
<meta property="twitter:title" content="{{ page.title }}" />
{% else %}
<meta property="og:title" content="{{ site.name }}" />
<meta property="twitter:title" content="{{ site.name }}" />
{% endif %}

{% if page.image %}
<meta property="og:image" content="{{ site.url }}{{ page.image }}"/>
<meta property="twitter:image" content="{{ site.url }}{{ page.image }}"/>
{% else %}
<meta property="og:image" content="{{ site.url }}{{ site.avatar }}"/>
<meta property="twitter:image" content="{{ site.url }}{{ site.avatar }}"/>
{% endif %}
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>

<!-- Keywords -->
<meta name="keywords" content="AI security, financial technology security, fintech security, Security Engineer, Cybersecurity Engineer, Information Security Engineer, Application Security Engineer, Cloud Security, Threat Detection Engineer, Incident Response, Vulnerability Management, SF Bay Area Security Jobs, Secure System Design, SecOps">

<!-- Open Graph Basic Tags -->
{% if page.layout == 'post' or page.layout == 'tech_post' %}
<meta property="og:type" content="article"/>
{% else %}
<meta property="og:type" content="website"/>
{% endif %}
<meta property="og:url" content="{{ site.url }}{{ page.url }}"/>

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:site" content="@w8mej"/>
<meta name="twitter:creator" content="@w8mej"/>

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png.avif"/>

<!-- Web App Manifest -->
<link rel="manifest" href="/site.webmanifest"/>

<!-- Preconnect (Performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://analytics.google.com">
    <link rel="preconnect" href="https://stats.g.doubleclick.net">

<!-- Theme Color -->
<meta name="theme-color" content="#ffffff"/>

<!-- Accessibility -->
<meta name="language" content="en-US"/>

<!-- Referrer Policy -->
<meta name="referrer" content="no-referrer-when-downgrade"/>

<!-- Content Security Policy (basic example, adjust as needed) 
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src *; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;"/>
-->

  <script type="application/ld+json" data-cfasync="false">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "{{ site.url }}#website",
          "url": "{{ site.url }}",
          "name": "{{ site.name }}",
          "description": "{{ site.description }}",
          "about": {
            "@id": "{{ site.url }}#john-menerick"
          },
          "publisher": {
            "@id": "{{ site.url }}#securesql"
          },
          "inLanguage": "en",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "{{ site.url }}/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "{% if page.layout == 'page' and page.url != '/about/' and page.url != '/services/' and page.url != '/' and page.url != '/search/' and page.url != '/casting/' %}CollectionPage{% else %}WebPage{% endif %}",
          "@id": "{{ site.url }}{{ page.url }}",
          "url": "{{ site.url }}{{ page.url }}",
          "name": "{% if page.title %}{{ page.title }} – {{ site.name }}{% else %}{{ site.name }}{% endif %}",
          "description": "{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}",
          "isPartOf": {
            "@id": "{{ site.url }}#website"
          },
          "about": {
            "@id": "{{ site.url }}#john-menerick"
          },
          "publisher": {
            "@id": "{{ site.url }}#securesql"
          },
          "inLanguage": "en",
          "primaryImageOfPage": {
            "@type": "ImageObject",
            "url": "{{ site.url }}{% if page.image %}{{ page.image }}{% else %}{{ site.avatar }}{% endif %}"
          }
        },
        {
          "@type": "Person",
          "@id": "{{ site.url }}#john-menerick",
          "name": "John Menerick",
          "alternateName": "W8MEJ",
          "headline": "Security Engineer | Detection & Response | Zero Trust & Trusted AI Compute",
          "jobTitle": "Security Engineer",
          "url": "{{ site.url }}",
          "image": "{{ site.url }}/images/JohnMenerickfunsized.gif",
          "description": "{{ site.description }}",
          "identifier": [
            {
              "@type": "PropertyValue",
              "name": "FCC Call Sign",
              "value": "W8MEJ"
            }
          ],
          "worksFor": {
            "@id": "{{ site.url }}#securesql"
          },
          "hasOccupation": {
            "@type": "Occupation",
            "name": "Security Engineer",
            "occupationalCategory": "15-1212",
            "description": "Performs applied security engineering in cloud infrastructures, AI systems, and distributed systems, with a focus on detection engineering and zero knowledge."
          },
          "skills": [
            "Detection Engineering",
            "Incident Response",
            "Threat Hunting",
            "Zero Trust Architecture",
            "Cloud Security (AWS, GCP, OCI)",
            "Confidential Computing",
            "Trusted Execution Environments",
            "Multi-Party Computation (MPC)",
            "Zero-Knowledge Proof Systems",
            "Machine Learning Security",
            "DevSecOps",
            "Vulnerability Management"
          ],
          "knowsAbout": [
            "Information Security",
            "Security Engineering",
            "Threat Detection",
            "AI and ML Security",
            "Distributed Systems",
            "PKI and Hardware Security Keys",
            "SIEM and Telemetry Pipelines",
            "Zero Trust Networking",
            "Offensive Security Research",
            "Ham Radio and RF Systems"
          ],
          "hasCredential": [
            {
              "@type": "EducationalOccupationalCredential",
              "name": "Amateur General Class License",
              "credentialCategory": "Professional",
              "identifier": "W8MEJ",
              "recognizedBy": {
                "@type": "Organization",
                "name": "Federal Communications Commission",
                "url": "https://www.fcc.gov"
              }
            }
          ],
          "award": [
            "Recognized for applied research in trusted AI compute and large-scale detection engineering",
            "Known for hands-on leadership in zero trust and incident response programs"
          ],
          "sameAs": [
            "https://linkedin.com/in/w8mej",
            "https://github.com/w8mej",
            "https://haxx.ninja",
            "https://dev.to/w8mej",
            "https://gitlab.com/w8mej",
            "https://twitch.tv/w8mej",
            "https://www.youtube.com/channel/UCUfaf6mQgh_cX6V-SaAww1w",
            "https://mastodon.social/@w8mej",
            "https://twitter.com/w8mej"
          ],
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "contactType": "Business",
              "email": "jobs@securesql.info"
            }
          ],
          "email": "jobs@securesql.info",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Castro Valley",
            "addressRegion": "California",
            "addressCountry": "US"
          }
        },
        {
          "@type": "Blog",
          "@id": "{{ site.url }}/blog/",
          "url": "{{ site.url }}",
          "name": "John Menerick's Security Insights",
          "description": "{{ site.description }}",
          "author": { "@id": "{{ site.url }}#john-menerick" }
        },
{% if page.layout == 'post' or page.layout == 'tech_post' %}
        {
          "@type": "BlogPosting",
          "headline": "{{ page.title }}",
          "image": "{{ site.url }}{{ page.image | default: site.avatar }}",
          "author": { "@id": "https://www.securesql.info#john-menerick" },
          "publisher": {
            "@type": "Organization",
            "name": "John Menerick's Security Blog",
            "logo": {
              "@type": "ImageObject",
              "url": "{{ site.url }}{{ site.avatar }}"
            }
          },
          "datePublished": "{{ page.date | date_to_xmlschema }}",
          "dateModified": "{{ page.modified_date | default: page.date | date_to_xmlschema }}",
          "mainEntityOfPage": "{{ site.url }}{{ page.url }}",
          "description": "{{ page.description | default: page.excerpt | strip_html }}",
          "speakable": {
            "@type": "SpeakableSpecification",
            "cssSelector": ["h1", ".entry"]
          },
          "articleSection": "{{ page.categories.first | default: page.category | escape }}",
          "wordCount": "{{ page.content | number_of_words }}",
          "keywords": "{{ page.tags | join: ', ' | default: page.keywords | escape }}"
        },
{% endif %}
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            {
              "@type": "ListItem",
              "position": 1,
              "name": "Home",
              "item": "{{ site.url }}"
            }
{% assign b_pos = 2 %}
{% if page.category %}
            ,{
              "@type": "ListItem",
              "position": {{ b_pos }},
              "name": "{{ page.category | capitalize | escape }}",
              "item": "{{ site.url }}/{{ page.category }}"
            }
{% assign b_pos = b_pos | plus: 1 %}
{% elsif page.categories and page.categories.size > 0 %}
            ,{
              "@type": "ListItem",
              "position": {{ b_pos }},
              "name": "{{ page.categories.first | capitalize | escape }}",
              "item": "{{ site.url }}/{{ page.categories.first | slugify }}"
            }
{% assign b_pos = b_pos | plus: 1 %}
{% endif %}
{% if page.url != '/' and page.url != '/index.html' %}
            ,{
              "@type": "ListItem",
              "position": {{ b_pos }},
              "name": "{% if page.title %}{{ page.title | escape }}{% else %}Page{% endif %}",
              "item": "{{ site.url }}{{ page.url }}"
            }
{% endif %}
          ]
        },
        {
          "@type": "ProfessionalService",
          "@id": "{{ site.url }}/services#consulting",
          "name": "John Menerick – Information Security Consulting",
          "url": "{{ site.url }}/services",
          "description": "Expert consulting in cybersecurity, security engineering, threat detection, vulnerability management, and incident response.",
          "provider": { "@id": "https://www.securesql.info#john-menerick" },
          "areaServed": "Global",
          "additionalType": [
            "Information Security Consulting",
            "Cybersecurity",
            "Incident Response",
            "Security Engineering"
          ]
        }
{% if page.youtube_id %}
        ,{
          "@type": "VideoObject",
          "name": "{{ page.title | escape }}",
          "description": "{{ page.description | default: page.excerpt | strip_html | escape }}",
          "thumbnailUrl": "https://img.youtube.com/vi/{{ page.youtube_id }}/maxresdefault.jpg",
          "uploadDate": "{{ page.date | date_to_xmlschema }}",
          "embedUrl": "https://www.youtube.com/embed/{{ page.youtube_id }}"
        }
{% endif %}
        ,{
          "@type": "Organization",
          "@id": "{{ site.url }}#securesql",
          "name": "SecureSQL",
          "url": "{{ site.url }}",
          "logo": {
            "@type": "ImageObject",
            "url": "{{ site.url }}{{ site.avatar }}"
          },
          "description": "Expert consulting in cybersecurity, threat detection, and zero trust architectures led by John Menerick.",
          "founder": {
            "@id": "{{ site.url }}#john-menerick"
          },
          "sameAs": [
             "https://securesql.info"
          ]
        }
      ]
    }
    </script>

<a rel="me" href="https://mastodon.social/@w8mej" style="display:none;">Mastodon</a>
